name: CI

on:
  # pull_request:
  #   branches: ['**']
  #   paths-ignore:
  #     - '**.md'
  #     - 'docs/**'
  workflow_dispatch: # allow manual trigger when re-enabling

concurrency:
  group: ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  CI: true
  TESTCONTAINERS_RYUK_DISABLED: true

jobs:

  detect:
    runs-on: ubuntu-latest
    outputs:
      kotlin-matrix: ${{ steps.affected.outputs.kotlin_matrix }}
      has-kotlin: ${{ steps.affected.outputs.has_kotlin }}
      web-affected: ${{ steps.affected.outputs.web_affected }}
      golang-matrix: ${{ steps.affected.outputs.golang_matrix }}
      has-golang: ${{ steps.affected.outputs.has_golang }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Nx dependencies
        run: npm ci

      - name: Determine affected projects
        id: affected
        run: |
          set -euo pipefail

          BASE="origin/${{ github.event.pull_request.base.ref }}"

          AFFECTED=$(npx nx show projects --affected --base="$BASE" --json 2>/dev/null)

          # Known Kotlin API services (have package.json, appear without ":" prefix)
          KOTLIN_KNOWN='["security","assets","financialdata","assistant"]'

          # Kotlin: projects with ":" prefix (Gradle libs) OR in known Kotlin API list
          KOTLIN_SERVICES=$(echo "$AFFECTED" | jq --argjson known "$KOTLIN_KNOWN" '[
            .[] |
            if startswith(":") then ltrimstr(":")
            elif (. as $p | $known | any(. == $p)) then .
            else empty
            end
          ]')

          # Build Kotlin matrix
          KOTLIN_MATRIX=$(echo "$KOTLIN_SERVICES" | jq -c '[.[] | {service: .}]')

          HAS_KOTLIN=$(echo "$KOTLIN_MATRIX" | jq 'length > 0')

          # Web
          WEB_AFFECTED=$(echo "$AFFECTED" | jq 'any(. == "neotool-web")')

          # Go: not ":" prefix, not "neotool-*", not in known Kotlin list
          GO_PROJECTS=$(echo "$AFFECTED" | jq -c --argjson known "$KOTLIN_KNOWN" '[
            .[] |
            select(startswith(":") | not) |
            select(startswith("neotool-") | not) |
            select(. as $p | $known | any(. == $p) | not)
          ]')

          # Build Go matrix with paths from project.json root directories
          GO_MATRIX="[]"
          if [ "$(echo "$GO_PROJECTS" | jq 'length')" -gt 0 ]; then
            GO_MATRIX=$(echo "$GO_PROJECTS" | jq -c '.[]' | while read -r proj; do
              proj=$(echo "$proj" | tr -d '"')
              root=$(find workers/golang -name "project.json" -path "*/${proj}/project.json" -exec dirname {} \; 2>/dev/null | head -1)
              if [ -n "$root" ]; then
                jq -n --arg service "$proj" --arg path "$root" '{service: $service, path: $path}'
              fi
            done | jq -s -c '.')
          fi

          HAS_GOLANG=$(echo "$GO_MATRIX" | jq 'length > 0')

          {
            echo "kotlin_matrix=$KOTLIN_MATRIX"
            echo "has_kotlin=$HAS_KOTLIN"
            echo "web_affected=$WEB_AFFECTED"
            echo "golang_matrix=$GO_MATRIX"
            echo "has_golang=$HAS_GOLANG"
          } >> "$GITHUB_OUTPUT"

          # Summary
          {
            echo "### Nx Affected Detection"
            echo "- Base: \`$BASE\`"
            echo "- Kotlin modules: $(echo "$KOTLIN_MATRIX" | jq 'length') — $(echo "$KOTLIN_SERVICES" | jq -r 'join(", ")')"
            echo "- Web affected: $WEB_AFFECTED"
            echo "- Go workers: $(echo "$GO_MATRIX" | jq 'length') — $(echo "$GO_PROJECTS" | jq -r 'join(", ")')"
          } >> "$GITHUB_STEP_SUMMARY"

  test-kotlin:
    needs: detect
    if: needs.detect.outputs.has-kotlin == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.detect.outputs.kotlin-matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: true

      - name: Check (lint + test + coverage)
        working-directory: ./service/kotlin
        run: ./gradlew :${{ matrix.service }}:check --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.service }}
          path: service/kotlin/${{ matrix.service }}/build/reports/tests/
          retention-days: 7

  test-web:
    needs: detect
    if: needs.detect.outputs.web-affected == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10.16.0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint --max-warnings=0

      - name: Unit tests
        run: pnpm run test:unit

  test-golang:
    needs: detect
    if: needs.detect.outputs.has-golang == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.detect.outputs.golang-matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: ${{ matrix.path }}/go.sum

      - name: Run vet
        working-directory: ./${{ matrix.path }}
        run: go vet ./...

      - name: Run tests
        working-directory: ./${{ matrix.path }}
        run: go test -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: ${{ matrix.path }}/coverage.out
          retention-days: 7

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

  ci-success:
    runs-on: ubuntu-latest
    needs: [test-kotlin, test-web, test-golang, security-scan]
    if: always()
    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ needs.test-kotlin.result }}" == "failure" ]] || \
             [[ "${{ needs.test-web.result }}" == "failure" ]] || \
             [[ "${{ needs.test-golang.result }}" == "failure" ]] || \
             [[ "${{ needs.security-scan.result }}" == "failure" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi
          echo "All jobs passed or were skipped"
