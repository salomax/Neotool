# Testcontainers configuration for Colima
# This enables Testcontainers to work with Colima instead of Docker Desktop
# Note: The actual docker.host is configured via DOCKER_HOST environment variable
# in build.gradle.kts to use the current user's home directory dynamically

# Use Unix socket strategy explicitly
docker.client.strategy=org.testcontainers.dockerclient.UnixSocketClientProviderStrategy

# Enable container reuse for faster test execution
testcontainers.reuse.enable=true

# Disable Ryuk to avoid container startup issues
ryuk.disabled=true
