# Apollo Router v2.7.0 configuration (local dev)
supergraph:
  path: /graphql

cors:
  allow_any_origin: true

# Show detailed subgraph errors for debugging
include_subgraph_errors:
  all: true

# Local subgraphs (e.g. financialdata bacenInstitutionSlugs) can be slow; allow 60s
traffic_shaping:
  all:
    timeout: 60s

# Header propagation
headers:
  all:
    request:
      - propagate:
          named: authorization
      - propagate:
          named: x-request-id
      - propagate:
          named: traceparent
